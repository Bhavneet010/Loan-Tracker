<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7c3aed">
<title>Nirnay</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Nirnay">
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-av" style="background:radial-gradient(circle at 30% 30%,#3a1586 0%,#0f0425 70%);display:flex;align-items:center;justify-content:center;padding:0;">
            <svg viewBox="0 0 56 56" width="28" height="28"><line x1="28" y1="12" x2="28" y2="44" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/><line x1="12" y1="22" x2="44" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round"/><circle cx="14" cy="32" r="6" stroke="white" stroke-width="2" fill="rgba(255,255,255,0.1)"/><circle cx="42" cy="32" r="6" fill="white"/><path d="M28 22 L22 16 L34 16 Z" fill="white" opacity="0.5"/></svg>
          </div>
        <div>
          <div class="brand-name">निर्णय</div>
          <div class="brand-sub">AMCC Paonta Sahib</div>
        </div>
      </div>
      <div class="header-right">
        <div class="hbtn notif-hbtn" onclick="showNotifOverlay()" title="Notifications">
          🔔<span class="hbtn-badge" id="b-notifs"></span>
        </div>
        <div class="hbtn" onclick="showPerfOverlay()" title="Performance">
          📊
        </div>
        <div class="user-pill-wrap">
          <div class="user-pill" onclick="toggleUserMenu()">
            <span class="sync-dot" id="syncDot"></span>
            <div class="uav" id="userAv">?</div>
          </div>
          <div id="userMenu" class="user-dropdown" style="display:none;"></div>
        </div>
      </div>
    </div>
    <div class="mode-toggle-bar">
      <button class="mode-btn active" id="modeBtn-fresh" onclick="setAppMode('fresh')">Fresh Loans</button>
      <button class="mode-btn renewals-btn" id="modeBtn-renewals" onclick="setAppMode('renewals')">♻ Renewals <span class="mode-badge" id="b-renewals"></span></button>
    </div>
  </div>

  <div class="stats-scroll" id="statsScroll"></div>

  <!-- BOTTOM PANEL -->
  <div class="panel">
    <div class="panel-handle"></div>

    <!-- MAIN TABS -->
    <div class="tabs" id="mainTabs">
      <button class="tab active" data-tab="pending">Pending <span class="badge" id="b-pending">0</span></button>
      <button class="tab" data-tab="sanctioned">Sanctioned <span class="badge" id="b-sanctioned">0</span></button>
      <button class="tab" data-tab="returned">Returned <span class="badge" id="b-returned">0</span></button>
    </div>

    <!-- RENEWAL TABS (shown only in Renewals mode) -->
    <div class="tabs" id="renewalTabs" style="display:none;">
      <button class="tab active" data-rtab="done" onclick="setRenewalTab('done')">Done <span class="badge" id="b-rnw-done"></span></button>
      <button class="tab" data-rtab="due-soon" onclick="setRenewalTab('due-soon')">Due Soon <span class="badge" id="b-rnw-due-soon"></span></button>
      <button class="tab" data-rtab="overdue" onclick="setRenewalTab('overdue')">Overdue <span class="badge" id="b-rnw-overdue"></span></button>
      <button class="tab" data-rtab="npa-risk" onclick="setRenewalTab('npa-risk')">NPA Risk <span class="badge" id="b-rnw-npa-risk"></span></button>
    </div>

    <!-- SEARCH -->
    <div class="search-wrap" id="searchWrap" style="display:none;">
      <div class="search-wrap-inner">
        <input type="text" id="searchInput" class="search-inp" placeholder="Search customer, branch…" autocomplete="off" oninput="handleSearch(this.value)">
      </div>
    </div>

    <!-- DYNAMIC CONTENT -->
    <div id="content">
      <div class="loading-wrap"><div class="spinner"></div><span>Connecting…</span></div>
    </div>
  </div>

</div>

<!-- PERFORMANCE OVERLAY -->
<div id="perfOverlay" class="perf-overlay" style="display:none;">
  <div class="perf-overlay-header">
    <button class="back-btn" onclick="closePerfOverlay()">← Back</button>
    <span class="perf-overlay-title">Performance</span>
  </div>
  <div id="perfOverlayContent" style="padding:14px;"></div>
</div>

<!-- NOTIFICATIONS OVERLAY -->
<div class="overlay" id="notifOverlay" style="display:none;">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="margin:0;">Notifications</h2>
      <button class="btn btn-sm-danger" onclick="clearNotifications()">Clear all</button>
    </div>
    <div id="notifList"></div>
    <div class="form-row" style="margin-top:12px;">
      <button class="btn btn-cancel-full" onclick="closeNotifOverlay()">Close</button>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openForm()">+</button>

<!-- USER SELECT -->
<div class="overlay center" id="userModal" style="display:none;">
  <div class="modal-box">
    <h2>Who are you?</h2>
    <p>Select your name to continue</p>
    <div class="user-list" id="userList"></div>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(107,95,191,0.12);">
      <button class="user-btn admin" onclick="promptAdmin()">
        <div class="av">🔒</div><span>Admin</span>
      </button>
    </div>
  </div>
</div>

<!-- ADD/EDIT FORM -->
<div class="overlay" id="formModal" style="display:none;">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="formTitle">Add New Loan</h2>
    <form id="loanForm" onsubmit="saveLoan(event)">
      <input type="hidden" id="loanId">
      <div class="form-group">
        <label>Allocated To *</label>
        <select id="fOfficer" required><option value="">Select officer</option></select>
      </div>
      <div class="form-group">
        <label>Category *</label>
        <select id="fCategory" required>
          <option value="">Select category</option>
          <option value="Agriculture">Agriculture</option>
          <option value="SME">SME</option>
          <option value="Education">Education</option>
        </select>
      </div>
      <div class="form-group">
        <label>Branch *</label>
        <select id="fBranch" required><option value="">Select branch</option></select>
      </div>
      <div class="form-group">
        <label>Customer Name *</label>
        <input type="text" id="fName" required placeholder="e.g. SUNIL SHARMA INDUSTRY">
      </div>
      <div class="form-group">
        <label>Amount (in Lakhs) *</label>
        <input type="number" id="fAmount" step="0.01" min="0" required placeholder="e.g. 35">
      </div>
      <div class="form-group">
        <label>Receive Date *</label>
        <input type="date" id="fReceive" required>
      </div>
      <div class="form-group" id="fSanctionGroup" style="display:none;">
        <label>Sanction Date</label>
        <input type="date" id="fSanction">
      </div>
      <div class="form-group">
        <label>Remarks</label>
        <textarea id="fRemarks" placeholder="Additional notes…"></textarea>
      </div>
      <div class="form-row">
        <button type="button" class="btn btn-cancel-full" onclick="closeForm()">Cancel</button>
        <button type="submit" class="btn btn-primary-full">Save Loan</button>
      </div>
    </form>
  </div>
</div>

<!-- PIN MODAL -->
<div class="overlay center" id="pinModal" style="display:none;">
  <div class="modal-box">
    <h2>Admin PIN</h2>
    <p>Enter 6-digit PIN to continue</p>
    <div class="form-group">
      <input type="password" id="pinInput" class="pin-input" maxlength="6" inputmode="numeric" placeholder="••••••">
    </div>
    <div class="form-row">
      <button class="btn btn-cancel-full" onclick="closePinModal()">Cancel</button>
      <button class="btn btn-primary-full" onclick="checkPin()">Unlock</button>
    </div>
  </div>
</div>

<!-- ADMIN SETTINGS -->
<div class="overlay" id="settingsModal" style="display:none;">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>Admin Settings</h2>
    <div class="settings-tabs">
      <button class="stab active" data-stab="officers" onclick="setSettingsTab('officers')">Officers</button>
      <button class="stab" data-stab="branches" onclick="setSettingsTab('branches')">Branches</button>
      <button class="stab" data-stab="adminid" onclick="setSettingsTab('adminid')">Admin ID</button>
      <button class="stab" data-stab="import" onclick="setSettingsTab('import')">Import</button>
    </div>
    <div id="settingsContent"></div>
    <div class="form-row">
      <button class="btn btn-cancel-full" onclick="closeSettings()">Done</button>
    </div>
  </div>
</div>

<!-- FIREBASE + LOGIC -->
<script type="module" src="js/app.js"></script>

<!-- NIRNAY SPLASH SCREEN -->
<div id="nirnay-splash" style="position:fixed;inset:0;z-index:9999;background:linear-gradient(175deg,#06030f 0%,#130530 40%,#2a0f6e 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;font-family:Georgia,serif;transition:opacity 0.6s ease;">
  <div style="width:110px;height:110px;border-radius:27px;background:radial-gradient(circle at 30% 30%,#3a1586 0%,#0f0425 70%);display:flex;align-items:center;justify-content:center;box-shadow:0 12px 36px rgba(138,92,255,0.5);animation:nirnay-pop 0.9s cubic-bezier(0.34,1.56,0.64,1);">
    <svg viewBox="0 0 56 56" width="64" height="64"><line x1="28" y1="12" x2="28" y2="44" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/><line x1="12" y1="22" x2="44" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round"/><circle cx="14" cy="32" r="6" stroke="white" stroke-width="2" fill="rgba(255,255,255,0.1)"/><circle cx="42" cy="32" r="6" fill="white"/><path d="M28 22 L22 16 L34 16 Z" fill="white" opacity="0.5"/></svg>
  </div>
  <h1 style="margin:0;font-size:32px;font-weight:700;color:#fff;letter-spacing:-0.8px;">Nir<em style="color:#c4b5fd;font-style:italic;font-weight:400;">nay</em></h1>
  <p style="margin:0;font-family:'Helvetica Neue',sans-serif;font-size:10px;color:#8b72d4;letter-spacing:4px;font-weight:600;">DECISIONS · DELIVERED</p>
  <div style="width:56px;height:2px;background:rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;position:relative;">
    <div style="position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,#a78bfa,transparent);animation:nirnay-shimmer 1.8s infinite;"></div>
  </div>
</div>
<style>
@keyframes nirnay-pop{0%{transform:scale(0.7);opacity:0;}100%{transform:scale(1);opacity:1;}}
@keyframes nirnay-shimmer{to{left:200%;}}
</style>
<script>
(function(){
  var s=document.getElementById('nirnay-splash');
  setTimeout(function(){s.style.opacity='0';},1400);
  setTimeout(function(){s.remove();},2000);
})();
</script>
</body>
</html>
