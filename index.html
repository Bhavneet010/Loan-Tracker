<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7B6FD4">
<title>Loan Progress</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Loan Progress">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-av">₹</div>
        <div>
          <div class="brand-name">Loan Progress</div>
          <div class="brand-sub">AMCC Paonta Sahib</div>
        </div>
      </div>
      <div class="header-right">
        <div class="hbtn" id="darkBtn" onclick="toggleDark()" title="Dark mode">🌙</div>
        <div class="hbtn" onclick="handleSettings()" title="Settings">⚙️</div>
        <div class="user-pill" onclick="showUserSelect()">
          <span class="sync-dot" id="syncDot"></span>
          <div class="uav" id="userAv">?</div>
          <span id="userName">Select</span>
        </div>
      </div>
    </div>
  </div>

  <!-- PAGE HERO + STATS (lavender gradient area) -->
  <div class="page-hero" id="pageHero">
    <div class="page-title" id="pageTitle">Pending</div>
    <div class="page-sub" id="pageSub">Loading…</div>
  </div>
  <div class="stats-scroll" id="statsScroll"></div>

  <!-- BOTTOM PANEL -->
  <div class="panel">
    <div class="panel-handle"></div>

    <!-- MAIN TABS -->
    <div class="tabs" id="mainTabs">
      <button class="tab active" data-tab="pending">Pending <span class="badge" id="b-pending">0</span></button>
      <button class="tab" data-tab="sanctioned">Sanctioned <span class="badge" id="b-sanctioned">0</span></button>
      <button class="tab" data-tab="returned">Returned <span class="badge" id="b-returned">0</span></button>
      <button class="tab" data-tab="daily">Daily Report</button>
    </div>

    <!-- SEARCH -->
    <div class="search-wrap" id="searchWrap" style="display:none;">
      <div class="search-wrap-inner">
        <input type="text" id="searchInput" class="search-inp" placeholder="Search customer, branch…" autocomplete="off" oninput="handleSearch(this.value)">
      </div>
    </div>

    <!-- DYNAMIC CONTENT -->
    <div id="content">
      <div class="loading-wrap"><div class="spinner"></div><span>Connecting…</span></div>
    </div>
  </div>

</div>

<!-- FAB -->
<button class="fab" onclick="openForm()">+</button>

<!-- USER SELECT -->
<div class="overlay center" id="userModal" style="display:none;">
  <div class="modal-box">
    <h2>Who are you?</h2>
    <p>Select your name to continue</p>
    <div class="user-list" id="userList"></div>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(107,95,191,0.12);">
      <button class="user-btn admin" onclick="promptAdmin()">
        <div class="av">🔒</div><span>Admin</span>
      </button>
    </div>
  </div>
</div>

<!-- ADD/EDIT FORM -->
<div class="overlay" id="formModal" style="display:none;">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="formTitle">Add New Loan</h2>
    <form id="loanForm" onsubmit="saveLoan(event)">
      <input type="hidden" id="loanId">
      <div class="form-group">
        <label>Allocated To *</label>
        <select id="fOfficer" required><option value="">Select officer</option></select>
      </div>
      <div class="form-group">
        <label>Category *</label>
        <select id="fCategory" required>
          <option value="">Select category</option>
          <option value="Agriculture">Agriculture</option>
          <option value="SME">SME</option>
          <option value="Education">Education</option>
        </select>
      </div>
      <div class="form-group">
        <label>Branch *</label>
        <select id="fBranch" required><option value="">Select branch</option></select>
      </div>
      <div class="form-group">
        <label>Customer Name *</label>
        <input type="text" id="fName" required placeholder="e.g. SUNIL SHARMA INDUSTRY">
      </div>
      <div class="form-group">
        <label>Amount (in Lakhs) *</label>
        <input type="number" id="fAmount" step="0.01" min="0" required placeholder="e.g. 35">
      </div>
      <div class="form-group">
        <label>Receive Date *</label>
        <input type="date" id="fReceive" required>
      </div>
      <div class="form-group" id="fSanctionGroup" style="display:none;">
        <label>Sanction Date</label>
        <input type="date" id="fSanction">
      </div>
      <div class="form-group">
        <label>Remarks</label>
        <textarea id="fRemarks" placeholder="Additional notes…"></textarea>
      </div>
      <div class="form-row">
        <button type="button" class="btn btn-cancel-full" onclick="closeForm()">Cancel</button>
        <button type="submit" class="btn btn-primary-full">Save Loan</button>
      </div>
    </form>
  </div>
</div>

<!-- PIN MODAL -->
<div class="overlay center" id="pinModal" style="display:none;">
  <div class="modal-box">
    <h2>Admin PIN</h2>
    <p>Enter 6-digit PIN to continue</p>
    <div class="form-group">
      <input type="password" id="pinInput" class="pin-input" maxlength="6" inputmode="numeric" placeholder="••••••">
    </div>
    <div class="form-row">
      <button class="btn btn-cancel-full" onclick="closePinModal()">Cancel</button>
      <button class="btn btn-primary-full" onclick="checkPin()">Unlock</button>
    </div>
  </div>
</div>

<!-- ADMIN SETTINGS -->
<div class="overlay" id="settingsModal" style="display:none;">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>Admin Settings</h2>
    <div class="settings-tabs">
      <button class="stab active" data-stab="officers" onclick="setSettingsTab('officers')">Officers</button>
      <button class="stab" data-stab="branches" onclick="setSettingsTab('branches')">Branches</button>
      <button class="stab" data-stab="adminid" onclick="setSettingsTab('adminid')">Admin ID</button>
    </div>
    <div id="settingsContent"></div>
    <div class="form-row">
      <button class="btn btn-cancel-full" onclick="closeSettings()">Done</button>
    </div>
  </div>
</div>

<!-- FIREBASE + LOGIC -->
<script type="module" src="js/app.js"></script>
</body>
</html>
