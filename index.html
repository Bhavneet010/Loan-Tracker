<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7B6FD4">
<title>Loan Progress</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Loan Progress">
<style>
/* ── TOKENS ── */
:root {
  --p1:#5A4EAF; --p2:#7B6FD4; --p3:#9B8FE4;
  --p-bg:rgba(107,95,191,0.10); --p-bd:rgba(107,95,191,0.22);
  --glass:rgba(255,255,255,0.65); --glass-bd:rgba(255,255,255,0.85);
  --text1:#1E1B3A; --text2:#3D3480; --text3:rgba(30,27,58,0.65);
  --green:#047857; --green-bg:rgba(16,185,129,0.10); --green-bd:rgba(16,185,129,0.25);
  --amber:#B45309; --amber-bg:rgba(245,158,11,0.10); --amber-bd:rgba(245,158,11,0.25);
  --red:#B91C1C;   --red-bg:rgba(239,68,68,0.10);   --red-bd:rgba(239,68,68,0.25);
  --r:14px; --rl:20px;
}

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  margin:0;padding:0;min-height:100%;
  font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;
  color:var(--text1);
}

/* ── LAVENDER BACKGROUND ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(circle at 15% 10%,#C4BCE8 0%,transparent 45%),
    radial-gradient(circle at 90% 25%,#C8C0EC 0%,transparent 50%),
    radial-gradient(circle at 50% 35%,#BAB2E0 0%,transparent 55%),
    linear-gradient(160deg,#C9C4EE 0%,#B8B0E2 60%,#C2BCE8 100%);
}

/* Gradient only on top portion */
body::after{
  content:'';position:fixed;top:0;left:0;right:0;height:50vh;z-index:0;pointer-events:none;
  background:
    radial-gradient(circle at 15% 10%,#C4BCE8 0%,transparent 45%),
    radial-gradient(circle at 90% 25%,#C8C0EC 0%,transparent 50%),
    linear-gradient(160deg,#C9C4EE 0%,#B8B0E2 100%);
}

#app{position:relative;z-index:1;max-width:700px;margin:0 auto;padding-bottom:90px;}

/* ── HEADER ── */
.header{
  position:sticky;top:0;z-index:100;
  padding:14px 16px 10px;
  background:rgba(195,188,230,0.45);
  backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,255,255,0.4);
}
.header-top{display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-av{
  width:38px;height:38px;border-radius:12px;
  background:rgba(255,255,255,0.3);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.55);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:800;color:var(--text2);
}
.brand-name{font-size:15px;font-weight:700;color:var(--text1);letter-spacing:-0.3px;}
.brand-sub{font-size:11px;color:var(--text3);font-weight:500;}
.header-right{display:flex;gap:7px;align-items:center;}
.hbtn{
  width:36px;height:36px;border-radius:10px;
  background:rgba(255,255,255,0.3);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.5);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;
}
.user-pill{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.3);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.5);
  padding:4px 10px 4px 4px;border-radius:20px;cursor:pointer;
  font-size:13px;font-weight:600;color:var(--text1);
}
.uav{
  width:26px;height:26px;border-radius:50%;
  background:rgba(255,255,255,0.9);color:var(--p1);
  font-weight:700;font-size:11px;
  display:flex;align-items:center;justify-content:center;
}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#10B981;display:inline-block;margin-right:2px;}
.sync-dot.off{background:#EF4444;}

/* ── PAGE TITLE AREA ── */
.page-hero{padding:14px 18px 0;}
.page-title{font-size:30px;font-weight:800;color:var(--text1);letter-spacing:-1px;margin-bottom:3px;}
.page-sub{font-size:13px;color:var(--text3);font-weight:500;}

/* ── STAT SCROLL ── */
.stats-scroll{
  display:flex;gap:8px;padding:12px 14px 14px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.stat{
  flex:1;min-width:0;
  background:rgba(255,255,255,0.30);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.55);
  padding:10px;border-radius:14px;color:var(--text1);
}
.stat-l{font-size:9px;text-transform:uppercase;letter-spacing:0.5px;font-weight:700;color:var(--text3);}
.stat-v{font-size:18px;font-weight:800;margin-top:2px;letter-spacing:-0.5px;}
.stat-s{font-size:10px;color:var(--text3);margin-top:0;}
.stat-badge{
  display:inline-flex;align-items:center;
  background:rgba(255,255,255,0.35);border:1px solid rgba(255,255,255,0.6);
  color:var(--text2);padding:2px 6px;border-radius:8px;
  font-size:9px;font-weight:700;margin-top:4px;
}

/* ── BOTTOM PANEL ── */
.panel{
  background:#F5F3FC;
  border-radius:26px 26px 0 0;
  padding:0 14px 80px;
  box-shadow:0 -6px 20px rgba(100,90,180,0.08);
  min-height:60vh;
}
.panel-handle{
  width:38px;height:4px;background:rgba(107,95,191,0.2);
  border-radius:2px;margin:10px auto 14px;
}

/* ── MAIN TABS ── */
.tabs{
  display:flex;gap:6px;overflow-x:auto;
  padding-bottom:12px;-webkit-overflow-scrolling:touch;
}
.tab{
  padding:9px 14px;border-radius:20px;
  font-size:13px;font-weight:600;cursor:pointer;
  white-space:nowrap;flex-shrink:0;border:none;
  background:rgba(255,255,255,0.7);
  border:1px solid rgba(107,95,191,0.15);
  color:#7B7A9A;
}
.tab .badge{
  display:inline-block;background:var(--p-bg);color:var(--p2);
  font-size:10px;font-weight:700;padding:1px 6px;
  border-radius:10px;margin-left:4px;
}
.tab.active{
  background:linear-gradient(135deg,var(--p2),var(--p3));
  color:white;border-color:transparent;
  box-shadow:0 4px 14px rgba(123,111,212,0.38);
}
.tab.active .badge{background:rgba(255,255,255,0.25);color:white;}

/* ── SUBTABS ── */
.subtabs{display:flex;gap:6px;padding-bottom:12px;overflow-x:auto;}
.subtab{
  padding:7px 14px;border-radius:20px;
  font-size:12px;font-weight:600;cursor:pointer;
  white-space:nowrap;border:none;
  background:rgba(255,255,255,0.7);
  border:1px solid rgba(107,95,191,0.15);color:#7B7A9A;
}
.subtab.active{
  background:var(--p-bg);border-color:var(--p-bd);
  color:var(--p1);font-weight:700;
}

/* ── SECTION HEADER ── */
.sec-head{display:flex;justify-content:space-between;align-items:center;margin:0 2px 10px;}
.sec-title{font-size:16px;font-weight:700;color:var(--text1);letter-spacing:-0.3px;}
.sec-count{
  font-size:11px;color:var(--p1);font-weight:700;
  background:var(--p-bg);border:1px solid var(--p-bd);
  padding:3px 10px;border-radius:10px;
}

/* ── LOAN CARD ── */
.loan-card{
  background:rgba(255,255,255,0.65);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.85);border-radius:18px;
  padding:14px 14px 13px 17px;margin-bottom:10px;
  box-shadow:0 4px 14px rgba(107,95,191,0.07);
  position:relative;overflow:hidden;
}
.loan-card::before{
  content:'';position:absolute;top:0;left:0;
  width:4px;height:100%;
  background:linear-gradient(180deg,var(--p2),var(--p3));
}
.loan-card.returned::before{background:linear-gradient(180deg,#EF4444,#F87171);}
.loan-card.sanctioned::before{background:linear-gradient(180deg,#10B981,#34D399);}
.lc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.lc-left{flex:1;min-width:0;}
.lc-name{font-size:14px;font-weight:700;color:var(--text1);letter-spacing:-0.2px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:210px;}
.lc-branch{font-size:11px;color:#7B7A9A;}
.lc-amount{font-size:20px;font-weight:800;color:var(--text1);letter-spacing:-0.5px;white-space:nowrap;}
.lc-amount .u{font-size:11px;color:#7B7A9A;font-weight:500;}
.lc-tags{display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
.tag{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;}
.tag.sme  {background:var(--p-bg);color:var(--p1);border:1px solid var(--p-bd);}
.tag.agri {background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}
.tag.edu  {background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);}
.tag.date {background:rgba(255,255,255,0.8);color:#7B7A9A;border:1px solid rgba(0,0,0,0.07);}
.tag.officer{background:rgba(255,255,255,0.8);color:var(--text2);border:1px solid rgba(0,0,0,0.07);}
.lc-remarks{
  margin-bottom:10px;padding:8px 10px;
  background:var(--amber-bg);border:1px solid var(--amber-bd);
  border-radius:8px;font-size:12px;color:var(--amber);
}
.lc-actions{display:flex;gap:7px;}
.btn{
  padding:10px;border-radius:11px;font-size:12px;font-weight:700;
  cursor:pointer;border:none;text-align:center;
  display:inline-flex;align-items:center;justify-content:center;gap:4px;
}
.btn-sanction{
  flex:1;
  background:linear-gradient(135deg,var(--p2),var(--p1));
  color:white;box-shadow:0 4px 12px rgba(107,95,191,0.35);
}
.btn-return{
  flex:1;
  background:rgba(255,255,255,0.85);color:var(--text1);
  border:1px solid rgba(0,0,0,0.08)!important;
}
.btn-more{
  width:38px;flex:none;
  background:rgba(255,255,255,0.85);color:#7B7A9A;
  border:1px solid rgba(0,0,0,0.08)!important;font-size:15px;
}
.btn-outline{
  background:rgba(255,255,255,0.85);color:var(--text1);
  border:1px solid rgba(0,0,0,0.08)!important;
}
.btn-success{
  flex:1;
  background:var(--green-bg);color:var(--green);
  border:1px solid var(--green-bd)!important;
}
.btn-danger{
  background:var(--red-bg);color:var(--red);
  border:1px solid var(--red-bd)!important;
  width:38px;flex:none;font-size:14px;
}
.btn-primary-full{
  flex:1;
  background:linear-gradient(135deg,var(--p2),var(--p1));
  color:white;box-shadow:0 4px 12px rgba(107,95,191,0.3);
  padding:13px;font-size:15px;border-radius:13px;
}
.btn-cancel-full{
  flex:1;
  background:rgba(255,255,255,0.85);color:var(--text1);
  border:1px solid rgba(0,0,0,0.08)!important;
  padding:13px;font-size:15px;border-radius:13px;
}

/* ── EMPTY STATE ── */
.empty-state{
  text-align:center;padding:48px 20px;
  background:rgba(255,255,255,0.5);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.8);border-radius:18px;
}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-msg{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:4px;}
.empty-sub{font-size:12px;color:#7B7A9A;}

/* ── DAILY REPORT ── */
.report-card{
  background:rgba(255,255,255,0.65);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.85);border-radius:18px;
  margin-bottom:12px;overflow:hidden;
  box-shadow:0 4px 14px rgba(107,95,191,0.06);
}
.report-head{
  padding:14px 16px;border-bottom:1px solid rgba(107,95,191,0.08);
  display:flex;justify-content:space-between;align-items:center;
}
.report-head-title{font-size:14px;font-weight:700;color:var(--text1);}
.report-head-amt{font-size:13px;font-weight:700;color:var(--p1);}
.rtable{width:100%;border-collapse:collapse;font-size:12px;}
.rtable th{
  padding:8px 10px;text-align:left;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;
  color:#7B7A9A;border-bottom:1px solid rgba(107,95,191,0.08);
  background:rgba(107,95,191,0.03);
}
.rtable th.r,.rtable td.r{text-align:right;}
.rtable td{padding:9px 10px;border-bottom:1px solid rgba(0,0,0,0.03);color:var(--text1);}
.rtable tr:last-child td{border-bottom:none;}
.rtable tr.total td{font-weight:700;background:var(--p-bg);}

/* ── MODALS ── */
.overlay{
  position:fixed;inset:0;background:rgba(20,18,40,0.5);
  z-index:200;display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(3px);
}
.overlay.center{align-items:center;padding:20px;}
.sheet{
  background:#F2F0FA;
  border-radius:24px 24px 0 0;
  width:100%;max-width:640px;max-height:92vh;overflow-y:auto;
  padding:0 18px 40px;-webkit-overflow-scrolling:touch;
}
@media(min-width:640px){.sheet{border-radius:24px;margin-bottom:0;}}
.sheet-handle{width:38px;height:4px;background:rgba(107,95,191,0.2);border-radius:2px;margin:12px auto 18px;}
.sheet h2{margin:0 0 18px;font-size:20px;font-weight:800;color:var(--text1);letter-spacing:-0.5px;}
.modal-box{
  background:#F2F0FA;border-radius:24px;
  padding:24px;width:100%;max-width:380px;
}
.modal-box h2{margin:0 0 4px;font-size:22px;font-weight:800;color:var(--text1);}
.modal-box p{font-size:13px;color:#7B7A9A;margin:0 0 18px;}

/* ── USER BUTTONS ── */
.user-list{display:flex;flex-direction:column;gap:8px;}
.user-btn{
  padding:13px 16px;border-radius:var(--r);
  background:rgba(255,255,255,0.65);border:1px solid rgba(255,255,255,0.85);
  font-size:15px;font-weight:600;cursor:pointer;
  text-align:left;color:var(--text1);
  display:flex;align-items:center;gap:12px;
}
.user-btn .av{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--p2),var(--p3));
  color:white;font-weight:700;font-size:14px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.user-btn.admin .av{background:linear-gradient(135deg,#374151,#1F2937);}

/* ── FORM ── */
.form-group{margin-bottom:14px;}
.form-group label{
  display:block;margin-bottom:6px;
  font-size:11px;font-weight:700;color:var(--text2);
  text-transform:uppercase;letter-spacing:0.5px;
}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:12px 14px;
  border:1px solid rgba(107,95,191,0.2);border-radius:12px;
  font-size:15px;font-family:inherit;
  background:rgba(255,255,255,0.75);color:var(--text1);outline:none;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
  border-color:var(--p2);box-shadow:0 0 0 3px rgba(107,95,191,0.15);
}
.form-group textarea{resize:vertical;min-height:64px;}
.form-row{display:flex;gap:10px;margin-top:20px;}

/* ── SETTINGS ITEMS ── */
.setting-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 12px;background:rgba(255,255,255,0.65);
  border:1px solid rgba(255,255,255,0.85);border-radius:10px;margin-bottom:6px;
}
.setting-item span{font-size:14px;font-weight:500;color:var(--text1);}
.btn-sm-danger{
  padding:5px 10px;border-radius:8px;font-size:12px;font-weight:600;
  background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);cursor:pointer;
}

/* ── FAB ── */
.fab{
  position:fixed;bottom:22px;right:18px;
  width:54px;height:54px;border-radius:17px;
  background:linear-gradient(135deg,var(--p2),var(--p3));
  color:white;border:none;font-size:26px;
  box-shadow:0 8px 24px rgba(107,95,191,0.5);
  cursor:pointer;z-index:80;
  display:flex;align-items:center;justify-content:center;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--text1);color:white;
  padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;
  z-index:9999;white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,0.25);
  animation:fadeUp 0.2s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── LOADING ── */
.loading-wrap{
  display:flex;flex-direction:column;align-items:center;
  padding:60px 20px;gap:14px;color:#7B7A9A;
}
.spinner{
  width:32px;height:32px;border-radius:50%;
  border:3px solid var(--p-bd);border-top-color:var(--p2);
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.pin-input{letter-spacing:10px;text-align:center;font-size:22px!important;font-weight:700!important;}

@media(max-width:390px){
  .lc-name{max-width:160px;}
  .page-title{font-size:26px;}
}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-av">₹</div>
        <div>
          <div class="brand-name">Loan Progress</div>
          <div class="brand-sub">AMCC Paonta Sahib</div>
        </div>
      </div>
      <div class="header-right">
        <div class="hbtn" onclick="handleSettings()" title="Settings">⚙️</div>
        <div class="user-pill" onclick="showUserSelect()">
          <span class="sync-dot" id="syncDot"></span>
          <div class="uav" id="userAv">?</div>
          <span id="userName">Select</span>
        </div>
      </div>
    </div>
  </div>

  <!-- PAGE HERO + STATS (lavender gradient area) -->
  <div class="page-hero" id="pageHero">
    <div class="page-title" id="pageTitle">Pending</div>
    <div class="page-sub" id="pageSub">Loading…</div>
  </div>
  <div class="stats-scroll" id="statsScroll"></div>

  <!-- BOTTOM PANEL -->
  <div class="panel">
    <div class="panel-handle"></div>

    <!-- MAIN TABS -->
    <div class="tabs" id="mainTabs">
      <button class="tab active" data-tab="pending">Pending <span class="badge" id="b-pending">0</span></button>
      <button class="tab" data-tab="sanctioned">Sanctioned <span class="badge" id="b-sanctioned">0</span></button>
      <button class="tab" data-tab="returned">Returned <span class="badge" id="b-returned">0</span></button>
      <button class="tab" data-tab="daily">Daily Report</button>
    </div>

    <!-- DYNAMIC CONTENT -->
    <div id="content">
      <div class="loading-wrap"><div class="spinner"></div><span>Connecting…</span></div>
    </div>
  </div>

</div>

<!-- FAB -->
<button class="fab" onclick="openForm()">+</button>

<!-- USER SELECT -->
<div class="overlay center" id="userModal" style="display:none;">
  <div class="modal-box">
    <h2>Who are you?</h2>
    <p>Select your name to continue</p>
    <div class="user-list" id="userList"></div>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(107,95,191,0.12);">
      <button class="user-btn admin" onclick="promptAdmin()">
        <div class="av">🔒</div><span>Admin</span>
      </button>
    </div>
  </div>
</div>

<!-- ADD/EDIT FORM -->
<div class="overlay" id="formModal" style="display:none;">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="formTitle">Add New Loan</h2>
    <form id="loanForm" onsubmit="saveLoan(event)">
      <input type="hidden" id="loanId">
      <div class="form-group">
        <label>Allocated To *</label>
        <select id="fOfficer" required><option value="">Select officer</option></select>
      </div>
      <div class="form-group">
        <label>Category *</label>
        <select id="fCategory" required>
          <option value="">Select category</option>
          <option value="Agriculture">Agriculture</option>
          <option value="SME">SME</option>
          <option value="Education">Education</option>
        </select>
      </div>
      <div class="form-group">
        <label>Branch *</label>

const todayStr = () => { const d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,10); };
const fmtDate  = s => { if(!s) return ''; const [y,m,d]=s.split('-'); return `${d}.${m}.${y}`; };
const fmtAmt   = v => (parseFloat(v)||0).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:2});
const esc      = s => s==null?'':String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const initials = n => (n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

function toast(msg) {
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2600);
}

/* ── FIREBASE SETTINGS ── */
async function loadSettings() {
  try {
    const snap=await getDoc(doc(db,'settings','config'));
    if(snap.exists()){
      const d=snap.data();
      if(d.officers?.length) S.officers=d.officers;
      if(d.branches?.length) S.branches=d.branches;
    } else {
      await setDoc(doc(db,'settings','config'),{officers:S.officers,branches:S.branches});
    }
  } catch(e){console.error(e);}
}
async function saveSettings() {
  try { await setDoc(doc(db,'settings','config'),{officers:S.officers,branches:S.branches}); }
  catch(e){ toast('Error saving'); }
}

/* ── FIREBASE LOANS ── */
function subscribeLoans() {
  onSnapshot(query(collection(db,'loans'),orderBy('receiveDate','desc')), snap => {
    S.loans=[];
    snap.forEach(d=>S.loans.push({id:d.id,...d.data()}));
    document.getElementById('syncDot').classList.remove('off');
    updateBadges(); render();
  }, err => {
    document.getElementById('syncDot').classList.add('off');
    console.error(err);
  });
}
const newId   = ()=>'loan_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
const ts      = ()=>({updatedAt:new Date().toISOString(),updatedBy:S.user});
async function createLoan(data){ await setDoc(doc(db,'loans',newId()),{...data,status:'pending',createdAt:new Date().toISOString(),createdBy:S.user,...ts()}); }
async function updateLoan(id,data){ await updateDoc(doc(db,'loans',id),{...data,...ts()}); }

};

}

  document.getElementById('newOfficer').value='';

};
window.removeOfficer = async function(i){
  if(!confirm(`Remove ${S.officers[i]}?`)) return;
  S.officers.splice(i,1); await saveSettings(); renderSettingsList(); render();
};
window.addBranch = async function(){
  const v=document.getElementById('newBranch').value.trim();
  if(!v) return; if(S.branches.includes(v)){toast('Already exists');return;}
  S.branches.push(v); await saveSettings();
  document.getElementById('newBranch').value='';
  renderSettingsList(); toast('Branch added');
};
window.removeBranch = async function(i){
  if(!confirm(`Remove ${S.branches[i]}?`)) return;
  S.branches.splice(i,1); await saveSettings(); renderSettingsList();
};

window.openForm = function(loan=null){
  if(!S.user){ showUserSelect(); return; }

window.closeForm  = ()=>document.getElementById('formModal').style.display='none';
window.saveLoan   = async function(e){
  e.preventDefault();
  const id=document.getElementById('loanId').value;
  const data={
    allocatedTo:document.getElementById('fOfficer').value,
    category:document.getElementById('fCategory').value,

/* ── LOAN ACTIONS ── */
window.sanctionLoan = async function(id){
  const l=S.loans.find(x=>x.id===id); if(!l) return;
  if(!confirm(`Sanction loan for ${l.customerName}?\n₹${fmtAmt(l.amount)} Lakh`)) return;
  try { await updateLoan(id,{status:'sanctioned',sanctionDate:todayStr()}); toast('Sanctioned ✓'); }
  catch(e){ toast('Error'); }
};
window.returnLoan = async function(id){
  const l=S.loans.find(x=>x.id===id); if(!l) return;
  const reason=prompt(`Reason for returning ${l.customerName}?`,l.remarks||'');
  if(reason===null) return;
  try { await updateLoan(id,{status:'returned',remarks:reason,returnedDate:todayStr()}); toast('Marked as returned'); }
  catch(e){ toast('Error'); }
};
window.moveToPending = async function(id){
  const l=S.loans.find(x=>x.id===id); if(!l) return;
  if(!confirm(`Move ${l.customerName} back to Pending?`)) return;
  try { await updateLoan(id,{status:'pending'}); toast('Moved to pending'); }
  catch(e){ toast('Error'); }
};
window.editLoan   = id=>{ const l=S.loans.find(x=>x.id===id); if(l) openForm(l); };
window.deleteLoan = async function(id){
  if(!S.isAdmin){toast('Admin only');return;}
  const l=S.loans.find(x=>x.id===id); if(!l) return;
  if(!confirm(`DELETE ${l.customerName}?\nThis cannot be undone.`)) return;
  try { await removeLoan(id); toast('Deleted'); }
  catch(e){ toast('Error'); }
};

/* ── TABS ── */
document.getElementById('mainTabs').addEventListener('click',e=>{
  const btn=e.target.closest('[data-tab]'); if(!btn) return;
  document.querySelectorAll('#mainTabs .tab').forEach(t=>t.classList.remove('active'));

window.setSub = sub=>{ S.sub=sub; render(); };

/* ── RENDER HELPERS ── */
function updateHero(){
  const titles={pending:'Pending',sanctioned:'Sanctioned',returned:'Returned',daily:'Daily Report'};
  const pending   = S.loans.filter(l=>l.status==='pending');
  const sanctioned= S.loans.filter(l=>l.status==='sanctioned');
  const returned  = S.loans.filter(l=>l.status==='returned');
  const pAmt = pending.reduce((s,l)=>s+(parseFloat(l.amount)||0),0);
  const sAmt = sanctioned.reduce((s,l)=>s+(parseFloat(l.amount)||0),0);
  const rAmt = returned.reduce((s,l)=>s+(parseFloat(l.amount)||0),0);
  document.getElementById('pageTitle').textContent = titles[S.tab]||'';
  const subMap={
    pending:`${pending.length} loan${pending.length!==1?'s':''} awaiting action`,
    sanctioned:`${sanctioned.length} loan${sanctioned.length!==1?'s':''} sanctioned`,
    returned:`${returned.length} loan${returned.length!==1?'s':''} returned`,
    daily:'Performance overview'
  };
  document.getElementById('pageSub').textContent = subMap[S.tab]||'';
  document.getElementById('statsScroll').innerHTML=`
    <div class="stat">
      <div class="stat-l">Pending</div>

    </div>
    <div class="stat">
      <div class="stat-l">This Month</div>
      <div class="stat-v">₹${fmtAmt(sAmt)}L</div>
      <div class="stat-s">${sanctioned.length} sanctioned</div>
      <div class="stat-badge">Month total</div>
    </div>
    <div class="stat">
      <div class="stat-l">Returned</div>
      <div class="stat-v">₹${fmtAmt(rAmt)}L</div>
      <div class="stat-s">${returned.length} items</div>
    </div>`;
}

function subtabsHtml(){
  return ['All','Agriculture','SME','Education'].map(t=>
    `<button class="subtab ${S.sub===t?'active':''}" onclick="setSub('${t}')">${t}</button>`
  ).join('');
}

function loanCard(loan, actions, variant=''){
  const remarks = loan.remarks?`<div class="lc-remarks">📝 ${esc(loan.remarks)}</div>`:'';
  const sanctTag = loan.sanctionDate?`<span class="tag date">✓ ${fmtDate(loan.sanctionDate)}</span>`:'';
  const retTag   = loan.returnedDate?`<span class="tag date">↩ ${fmtDate(loan.returnedDate)}</span>`:'';
  return `
  <div class="loan-card ${variant}">
    <div class="lc-top">
      <div class="lc-left">
        <div class="lc-name">${esc(loan.customerName)}</div>
        <div class="lc-branch">${esc(loan.branch||'')}</div>
      </div>
      <div class="lc-amount">₹${fmtAmt(loan.amount)}<span class="u"> L</span></div>
    </div>
    <div class="lc-tags">
      <span class="tag ${catCls(loan.category)}">${esc(loan.category)}</span>
      <span class="tag officer">${esc(loan.allocatedTo)}</span>
      <span class="tag date">Recd ${fmtDate(loan.receiveDate)}</span>
      ${sanctTag}${retTag}
    </div>
    ${remarks}
    <div class="lc-actions">${actions}</div>
  </div>`;
}

function emptyState(icon,msg,sub){
  return `<div class="empty-state"><div class="empty-icon">${icon}</div><div class="empty-msg">${msg}</div><div class="empty-sub">${sub}</div></div>`;
}

/* ── RENDER TABS ── */
function render(){
  if(!S.user){ showUserSelect(); return; }
  updateHero();
  const c=document.getElementById('content');
  if(S.tab==='pending')     renderPending(c);
  else if(S.tab==='sanctioned') renderSanctioned(c);
  else if(S.tab==='returned')   renderReturned(c);
  else if(S.tab==='daily')      renderDaily(c);
}

function renderPending(c){
  let loans=S.loans.filter(l=>l.status==='pending');
  if(S.sub!=='All') loans=loans.filter(l=>l.category===S.sub);
  const total=loans.reduce((s,l)=>s+(parseFloat(l.amount)||0),0);
  const cards=loans.length===0
    ? emptyState('📭','No pending loans','Tap + to add a new loan')
    : loans.map(l=>`${loanCard(l,`
        <button class="btn btn-sanction" onclick="sanctionLoan('${l.id}')">✓ Sanction</button>
        <button class="btn btn-return"   onclick="returnLoan('${l.id}')">↩ Return</button>
        <button class="btn btn-more"     onclick="editLoan('${l.id}')">✎</button>
        ${S.isAdmin?`<button class="btn btn-danger" onclick="deleteLoan('${l.id}')">🗑</button>`:''}`
      )}`).join('');
  c.innerHTML=`
    <div class="subtabs">${subtabsHtml()}</div>
    <div class="sec-head">
      <div class="sec-title">Pending Loans</div>
      <div class="sec-count">${loans.length} · ₹${fmtAmt(total)} L</div>
    </div>${cards}`;
}

function renderSanctioned(c){
  let loans=S.loans.filter(l=>l.status==='sanctioned')
    .sort((a,b)=>(b.sanctionDate||'').localeCompare(a.sanctionDate||''));
  if(S.sub!=='All') loans=loans.filter(l=>l.category===S.sub);
  const total=loans.reduce((s,l)=>s+(parseFloat(l.amount)||0),0);
  const cards=loans.length===0
    ? emptyState('🎉','No sanctioned loans yet','Sanction pending loans to see them here')
    : loans.map(l=>loanCard(l,`
        <button class="btn btn-return"  onclick="moveToPending('${l.id}')">↩ Pending</button>
        <button class="btn btn-more"    onclick="editLoan('${l.id}')">✎</button>
        ${S.isAdmin?`<button class="btn btn-danger" onclick="deleteLoan('${l.id}')">🗑</button>`:''}`,
      'sanctioned')).join('');
  c.innerHTML=`
    <div class="subtabs">${subtabsHtml()}</div>
    <div class="sec-head">
      <div class="sec-title">Sanctioned Loans</div>
      <div class="sec-count">${loans.length} · ₹${fmtAmt(total)} L</div>
    </div>${cards}`;
}

function renderReturned(c){
  const loans=S.loans.filter(l=>l.status==='returned');
  const total=loans.reduce((s,l)=>s+(parseFloat(l.amount)||0),0);
  const cards=loans.length===0
    ? emptyState('📋','No returned loans','Returned loans will appear here')
    : loans.map(l=>loanCard(l,`
        <button class="btn btn-sanction" onclick="sanctionLoan('${l.id}')">✓ Sanction</button>
        <button class="btn btn-return"   onclick="moveToPending('${l.id}')">↩ Pending</button>
        <button class="btn btn-more"     onclick="editLoan('${l.id}')">✎</button>
        ${S.isAdmin?`<button class="btn btn-danger" onclick="deleteLoan('${l.id}')">🗑</button>`:''}`,
      'returned')).join('');
  c.innerHTML=`
    <div class="sec-head" style="margin-top:4px;">
      <div class="sec-title">Returned Loans</div>
      <div class="sec-count">${loans.length} · ₹${fmtAmt(total)} L</div>
    </div>${cards}`;
}

function renderDaily(c){
  const td=todayStr(), thisMonth=td.slice(0,7);
  const todayL  =S.loans.filter(l=>l.status==='sanctioned'&&l.sanctionDate===td);
  const monthL  =S.loans.filter(l=>l.status==='sanctioned'&&(l.sanctionDate||'').startsWith(thisMonth));
  const pendingL=S.loans.filter(l=>l.status==='pending');
  const tAmt=todayL.reduce((s,l)=>s+(parseFloat(l.amount)||0),0);
  const mAmt=monthL.reduce((s,l)=>s+(parseFloat(l.amount)||0),0);
  const pAmt=pendingL.reduce((s,l)=>s+(parseFloat(l.amount)||0),0);

  function mkTable(loans){
    if(!loans.length) return `<div style="padding:16px;text-align:center;font-size:13px;color:#7B7A9A;">No entries</div>`;
    const cats=['Agriculture','SME','Education'];
    const grp={};
    loans.forEach(l=>{
      const o=l.allocatedTo||'?'; const cat=l.category||'Other';
      if(!grp[o]) grp[o]={};
      if(!grp[o][cat]) grp[o][cat]={n:0,a:0};
      grp[o][cat].n++; grp[o][cat].a+=parseFloat(l.amount)||0;
    });
    let rows=''; const grand={n:0,a:0};
    S.officers.forEach(off=>{
      const g=grp[off]||{}; let rt={n:0,a:0};
      let cells=cats.map(cat=>{ const v=g[cat]||{n:0,a:0}; rt.n+=v.n; rt.a+=v.a; return `<td class="r">${v.n||''}</td><td class="r">${v.n?fmtAmt(v.a):''}</td>`; }).join('');
      grand.n+=rt.n; grand.a+=rt.a;
      rows+=`<tr><td>${esc(off)}</td>${cells}<td class="r"><b>${rt.n||0}</b></td><td class="r"><b>${rt.n?fmtAmt(rt.a):'0'}</b></td></tr>`;
    });
    let totCells=cats.map(cat=>{ let cn=0,ca=0; S.officers.forEach(o=>{ const v=(grp[o]||{})[cat]||{n:0,a:0}; cn+=v.n; ca+=v.a; }); return `<td class="r">${cn||''}</td><td class="r">${cn?fmtAmt(ca):''}</td>`; }).join('');
    rows+=`<tr class="total"><td>Total</td>${totCells}<td class="r">${grand.n}</td><td class="r">${fmtAmt(grand.a)}</td></tr>`;
    return `<div style="overflow-x:auto;"><table class="rtable">
      <thead>
        <tr><th>Officer</th>${cats.map(c=>`<th class="r" colspan="2">${c}</th>`).join('')}<th class="r" colspan="2">Total</th></tr>
        <tr><th></th>${cats.map(()=>'<th class="r">Cnt</th><th class="r">Amt</th>').join('')}<th class="r">Cnt</th><th class="r">Amt</th></tr>
      </thead>
      <tbody>${rows}</tbody></table></div>`;
  }

  c.innerHTML=`
    <div class="report-card">
      <div class="report-head"><span class="report-head-title">📅 Sanctioned Today — ${fmtDate(td)}</span><span class="report-head-amt">₹${fmtAmt(tAmt)} L</span></div>
      ${mkTable(todayL)}
    </div>
    <div class="report-card">
      <div class="report-head"><span class="report-head-title">📆 Sanctioned This Month</span><span class="report-head-amt">₹${fmtAmt(mAmt)} L</span></div>
      ${mkTable(monthL)}
    </div>
    <div class="report-card">
      <div class="report-head"><span class="report-head-title">⏳ Currently Pending</span><span class="report-head-amt">₹${fmtAmt(pAmt)} L</span></div>
      ${mkTable(pendingL)}
    </div>
    ${S.isAdmin?`<div style="text-align:center;margin-top:16px;">
      <button class="btn btn-cancel-full" onclick="handleSettings()" style="padding:12px 28px;font-size:14px;max-width:200px;">⚙️ Admin Settings</button>
    </div>`:''}`;
}

/* ── INIT ── */
async function init(){
  await loadSettings();
  const su=localStorage.getItem('lpUser');
  const sa=localStorage.getItem('lpAdmin')==='true';
  if(su){
    S.user=su; S.isAdmin=sa;
    document.getElementById('userName').textContent=su==='Admin'?'Admin':su;
    document.getElementById('userAv').textContent=su==='Admin'?'🔒':initials(su);
  }
  subscribeLoans();
  if(!S.user) showUserSelect();
}

if('serviceWorker' in navigator)
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));

init();
</script>
</body>
</html>
